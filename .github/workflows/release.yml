name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: docs/ReleaseNotes_14.1.2.md
          draft: false
          prerelease: false
